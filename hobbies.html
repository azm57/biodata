<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azeem's Hobbies</title>
    <link rel='shortcut icon' type='image/x-icon' href='images/favicon.ico' />
    <style>
        :root {
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --primary-text: #2d3436;
            --secondary-text: #636e72;
            --accent-color: #0984e3;
            --border-color: #eeeeee;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-text: #e0e0e0;
            --secondary-text: #b0b0b0;
            --accent-color: #74b9ff;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            transition: all 0.3s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: var(--secondary-text); margin-bottom: 40px; }

        .hobbies-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .hobby-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .hobby-card:hover {
            transform: translateY(-10px);
            border-bottom: 4px solid var(--accent-color);
        }

        .hobby-icon { font-size: 2rem; margin-bottom: 15px; display: block; }
        .hobby-title { font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeBtn">Toggle Mode</button>

    <h1>Azeem's Hobbies</h1>
    <p class="subtitle">Exploring the things I love to do in my free time.</p>

    <div class="hobbies-container">
        <div class="hobby-card">
            <span class="hobby-icon">📸</span>
            <span class="hobby-title">Photography</span>
        </div>
        <div class="hobby-card">
            <span class="hobby-icon">💻</span>
            <span class="hobby-title">Coding</span>
        </div>
        <div class="hobby-card">
            <span class="hobby-icon">🏔️</span>
            <span class="hobby-title">Hiking</span>
        </div>
        <div class="hobby-card">
            <span class="hobby-icon">📚</span>
            <span class="hobby-title">Reading</span>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('themeBtn');
        
        // Check for saved user preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
